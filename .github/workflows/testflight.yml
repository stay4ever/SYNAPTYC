name: TestFlight Deployment

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy-testflight:
    runs-on: macos-14
    timeout-minutes: 60
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Install Fastlane
        run: |
          sudo gem install fastlane -NV

      - name: Write App Store Connect API Key
        env:
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: |
          echo "$ASC_KEY_CONTENT" > $RUNNER_TEMP/AuthKey.p8
          chmod 600 $RUNNER_TEMP/AuthKey.p8

      - name: Install dependencies
        run: |
          cd nano-SYNAPSYS
          pod install --repo-update

      - name: Build and upload to TestFlight
        working-directory: ./nano-SYNAPSYS
        run: |
          fastlane beta \
            asc_key_id:${{ secrets.ASC_KEY_ID }} \
            asc_issuer_id:${{ secrets.ASC_ISSUER_ID }} \
            asc_key_filepath:~/.appstore/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - name: Clean up
        if: always()
        run: rm -f ~/.appstore/AuthKey_*.p8

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'TestFlight deployment failed. Check workflow logs.'
            })
