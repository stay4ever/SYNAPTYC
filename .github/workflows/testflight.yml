name: TestFlight Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install iOS Platform
        run: |
          sudo xcodebuild -license accept
          xcodebuild -runFirstLaunch || true
          xcodebuild -downloadPlatform iOS || true

      - name: Install Ruby & Fastlane
        run: |
          gem install bundler xcpretty
          cd fastlane && bundle install

      - name: Write App Store Connect API Key
        env:
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: |
          echo "$ASC_KEY_CONTENT" > $RUNNER_TEMP/AuthKey.p8
          echo "Key file size: $(wc -c < $RUNNER_TEMP/AuthKey.p8) bytes"
          echo "Key starts with: $(head -1 $RUNNER_TEMP/AuthKey.p8)"
          echo "Key ends with: $(tail -1 $RUNNER_TEMP/AuthKey.p8)"

      - name: Install Apple Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo "P12 file size: $(wc -c < $CERTIFICATE_PATH) bytes"
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 \
            -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" \
            $KEYCHAIN_PATH

          security list-keychain -d user -s $KEYCHAIN_PATH $(security list-keychain -d user | tr -d '"')
          security default-keychain -s $KEYCHAIN_PATH

          echo "=== Signing identities in app-signing keychain ==="
          security find-identity -v -p codesigning $KEYCHAIN_PATH
          echo ""
          echo "=== Signing identities across ALL keychains ==="
          security find-identity -v -p codesigning
          echo ""
          echo "=== Keychain search list ==="
          security list-keychains -d user

      - name: Install Provisioning Profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i $PP_PATH))
          echo "Provisioning profile UUID: $PP_UUID"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/${PP_UUID}.mobileprovision

          echo "=== Provisioning Profile Info ==="
          /usr/bin/security cms -D -i $PP_PATH | /usr/libexec/PlistBuddy -c "Print Name" /dev/stdin || true
          /usr/bin/security cms -D -i $PP_PATH | /usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" /dev/stdin || true
          /usr/bin/security cms -D -i $PP_PATH | /usr/libexec/PlistBuddy -c "Print Entitlements:get-task-allow" /dev/stdin 2>/dev/null && echo "(Development profile)" || echo "(Distribution profile)"

      - name: Build & Upload to TestFlight
        env:
          CI: "true"
          ASC_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
          TEAM_ID: ${{ secrets.TEAM_ID }}
          APP_IDENTIFIER: com.aievolution.nanosynapsys
          APP_STORE_CONNECT_APP_ID: ${{ secrets.APP_STORE_CONNECT_APP_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          cd fastlane && bundle exec fastlane beta

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
          rm -f $RUNNER_TEMP/AuthKey.p8

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SYNAPTYC-ipa
          path: build/nano-SYNAPSYS.ipa
          retention-days: 30
