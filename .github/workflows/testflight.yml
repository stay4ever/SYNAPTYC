name: TestFlight Deployment

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  deploy-testflight:
    name: Build & Upload to TestFlight
    runs-on: macos-14
    timeout-minutes: 60
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer
          xcodebuild -version

      - name: Prepare Xcode
        run: |
          sudo xcodebuild -license accept
          xcodebuild -runFirstLaunch || true
          # Boot CoreSimulatorService for platform downloads
          open -a /Applications/Xcode.app/Contents/Developer/Applications/Simulator.app 2>/dev/null &
          sleep 2
          killall Simulator 2>/dev/null || true
          xcodebuild -downloadPlatform iOS || true

      - name: Install build tools
        run: |
          gem install bundler xcpretty
          cd fastlane && bundle install

      - name: Write App Store Connect API Key
        env:
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: |
          echo "$ASC_KEY_CONTENT" > $RUNNER_TEMP/AuthKey.p8
          chmod 600 $RUNNER_TEMP/AuthKey.p8
          echo "Key file size: $(wc -c < $RUNNER_TEMP/AuthKey.p8) bytes"

      - name: Install signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo "P12 file size: $(wc -c < $CERTIFICATE_PATH) bytes"

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i $PP_PATH))
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision
          echo "Installed provisioning profile: $PP_UUID"

      - name: Build and upload to TestFlight
        env:
          ASC_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
          TEAM_ID: ${{ secrets.TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          cd fastlane && bundle exec fastlane beta

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SYNAPTYC-ipa
          path: build/nano-SYNAPSYS.ipa

      - name: Clean up
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
          rm -f $RUNNER_TEMP/AuthKey.p8
          rm -f $RUNNER_TEMP/build_certificate.p12
          rm -f $RUNNER_TEMP/build_pp.mobileprovision
