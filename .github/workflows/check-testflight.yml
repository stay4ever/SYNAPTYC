name: Check TestFlight Build Status

on:
  workflow_dispatch:

jobs:
  check:
    name: Check Build Status
    runs-on: macos-15
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write App Store Connect API Key
        env:
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: echo "$ASC_KEY_CONTENT" > $RUNNER_TEMP/AuthKey.p8

      - name: Check TestFlight Builds via ASC API
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_APP_ID: ${{ secrets.APP_STORE_CONNECT_APP_ID }}
          ASC_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
        run: |
          gem install jwt --quiet

          ruby - <<'RUBY'
          require 'jwt'
          require 'net/http'
          require 'json'
          require 'openssl'

          key_id    = ENV['ASC_KEY_ID']
          issuer_id = ENV['ASC_ISSUER_ID']
          app_id    = ENV['APP_STORE_CONNECT_APP_ID']
          key_path  = ENV['ASC_KEY_PATH']

          private_key = OpenSSL::PKey::EC.new(File.read(key_path))

          payload = {
            iss: issuer_id,
            iat: Time.now.to_i,
            exp: Time.now.to_i + 1200,
            aud: 'appstoreconnect-v1'
          }

          token = JWT.encode(payload, private_key, 'ES256', { kid: key_id })

          uri = URI("https://api.appstoreconnect.apple.com/v1/apps/#{app_id}/builds?limit=5&sort=-uploadedDate&include=preReleaseVersion")
          req = Net::HTTP::Get.new(uri)
          req['Authorization'] = "Bearer #{token}"
          req['Content-Type']  = 'application/json'

          resp = Net::HTTP.start(uri.hostname, uri.port, use_ssl: true) { |h| h.request(req) }
          data = JSON.parse(resp.body)

          builds = data['data'] || []

          if builds.empty?
            puts "No builds found."
          else
            puts "\n#{'='*60}"
            puts "  TestFlight Builds — com.aievolution.nanosynapsys"
            puts "#{'='*60}"
            builds.each do |b|
              attrs = b['attributes']
              puts "  Build   : #{attrs['version']}"
              puts "  State   : #{attrs['processingState']}"
              puts "  Uploaded: #{attrs['uploadedDate']}"
              puts "  Expired : #{attrs['expired']}"
              puts "-"*60
            end
          end
          RUBY

      - name: Cleanup
        if: always()
        run: rm -f $RUNNER_TEMP/AuthKey.p8
