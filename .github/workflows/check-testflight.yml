name: Check TestFlight Build Status

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'TestFlight Build ID (optional)'
        required: false
        type: string

jobs:
  check-build-status:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Write App Store Connect API Key
        env:
          ASC_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
        run: |
          mkdir -p $HOME/.appstore
          echo "$ASC_KEY_CONTENT" > $HOME/.appstore/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - name: Install App Store Connect CLI dependencies
        run: |
          pip install requests cryptography PyJWT

      - name: Check latest TestFlight build status
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          python3 << 'SCRIPT'
          import os
          import json
          import requests
          import jwt
          from datetime import datetime, timedelta

          # App Store Connect API credentials
          key_id = os.environ.get('ASC_KEY_ID')
          issuer_id = os.environ.get('ASC_ISSUER_ID')
          key_path = os.path.expanduser('~/.appstore/AuthKey_' + key_id + '.p8')

          # Read private key
          with open(key_path, 'r') as f:
              private_key = f.read()

          # Create JWT token
          now = datetime.utcnow()
          exp = now + timedelta(minutes=20)

          payload = {
              'iss': issuer_id,
              'iat': int(now.timestamp()),
              'exp': int(exp.timestamp()),
              'aud': 'appstoreconnect-v1'
          }

          token = jwt.encode(payload, private_key, algorithm='ES256', headers={'kid': key_id})

          # Fetch builds for nano-SYNAPSYS (bundle ID: com.aievolve.nanosynapsys)
          headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.api+json'
          }

          # Get app ID
          apps_url = 'https://api.appstoreconnect.apple.com/v1/apps'
          params = {
              'filter[bundleId]': 'com.aievolution.nanosynapsys',
              'limit': 1
          }

          resp = requests.get(apps_url, headers=headers, params=params)
          if resp.status_code != 200:
              print(f'Failed to fetch apps: {resp.text}')
              exit(1)

          data = resp.json()
          if not data['data']:
              print('App not found in App Store Connect')
              exit(1)

          app_id = data['data'][0]['id']
          print(f'Found app: {app_id}')

          # Get builds
          builds_url = f'https://api.appstoreconnect.apple.com/v1/builds'
          params = {
              'filter[app]': app_id,
              'limit': 5,
              'sort': '-uploadedDate'
          }

          resp = requests.get(builds_url, headers=headers, params=params)
          if resp.status_code != 200:
              print(f'Failed to fetch builds: {resp.text}')
              exit(1)

          builds = resp.json()['data']
          if not builds:
              print('No builds found')
              exit(0)

          print('Latest builds:')
          for build in builds[:5]:
              attrs = build['attributes']
              version = attrs.get('version', 'N/A')
              processing = attrs.get('processingState', 'N/A')
              uploaded = attrs.get('uploadedDate', 'N/A')
              expired = attrs.get('expirationDate', '')
              print(f"  Build {version}")
              print(f"    Processing: {processing}")
              print(f"    Uploaded:   {uploaded}")
              if expired:
                  print(f"    Expires:    {expired}")
          SCRIPT

      - name: Clean up
        if: always()
        run: rm -f ~/.appstore/AuthKey_*.p8
