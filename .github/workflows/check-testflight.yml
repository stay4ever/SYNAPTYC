name: Check TestFlight Build Status

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'TestFlight Build ID (optional)'
        required: false
        type: string

jobs:
  check-build-status:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Decode App Store Connect API Key
        env:
          ASC_API_KEY: ${{ secrets.ASC_API_KEY }}
        run: |
          mkdir -p $HOME/.appstore
          KEY_FILE="$HOME/.appstore/AuthKey_${{ secrets.ASC_KEY_ID }}.p8"
          # Write the secret value directly — try raw PEM first
          printf '%s\n' "$ASC_API_KEY" > "$KEY_FILE"
          # If it looks base64-encoded (no PEM headers), decode it
          if ! head -1 "$KEY_FILE" | grep -q "BEGIN"; then
            printf '%s' "$ASC_API_KEY" | base64 -d > "$KEY_FILE" 2>/dev/null || true
          fi
          # Debug: show key format (first/last line only, no secret data)
          echo "Key file format check:"
          head -1 "$KEY_FILE"
          tail -1 "$KEY_FILE"
          wc -c "$KEY_FILE"

      - name: Install App Store Connect CLI dependencies
        run: |
          pip install requests cryptography PyJWT

      - name: Check latest TestFlight build status
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          python3 << 'SCRIPT'
          import os
          import json
          import requests
          import jwt
          from cryptography.hazmat.primitives.serialization import load_pem_private_key
          from datetime import datetime, timedelta

          # App Store Connect API credentials
          key_id = os.environ.get('ASC_KEY_ID')
          issuer_id = os.environ.get('ASC_ISSUER_ID')
          key_path = os.path.expanduser('~/.appstore/AuthKey_' + key_id + '.p8')

          # Read and load private key
          with open(key_path, 'rb') as f:
              key_data = f.read().strip()

          try:
              private_key = load_pem_private_key(key_data, password=None)
          except Exception as e:
              print(f'Key load failed: {e}')
              print(f'Key starts with: {key_data[:30]}')
              print(f'Key length: {len(key_data)} bytes')
              exit(1)

          # Create JWT token
          now = datetime.utcnow()
          exp = now + timedelta(minutes=20)

          payload = {
              'iss': issuer_id,
              'iat': int(now.timestamp()),
              'exp': int(exp.timestamp()),
              'aud': 'appstoreconnect-v1'
          }

          token = jwt.encode(payload, private_key, algorithm='ES256', headers={'kid': key_id})

          # Fetch builds for nano-SYNAPSYS (bundle ID: com.aievolve.nanosynapsys)
          headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.api+json'
          }

          # Get app ID first
          apps_url = 'https://api.appstoreconnect.apple.com/v1/apps'
          params = {
              'filter[bundleId]': 'com.aievolve.nanosynapsys',
              'limit': 1
          }

          resp = requests.get(apps_url, headers=headers, params=params)
          if resp.status_code != 200:
              print(f'Failed to fetch apps: {resp.text}')
              exit(1)

          data = resp.json()
          if not data['data']:
              print('App not found in App Store Connect')
              exit(1)

          app_id = data['data'][0]['id']
          print(f'Found app: {app_id}')

          # Get builds
          builds_url = f'https://api.appstoreconnect.apple.com/v1/apps/{app_id}/builds'
          params = {
              'sort': '-uploadedDate',
              'limit': 5
          }

          resp = requests.get(builds_url, headers=headers, params=params)
          if resp.status_code != 200:
              print(f'Failed to fetch builds: {resp.text}')
              exit(1)

          builds = resp.json()['data']
          if not builds:
              print('No builds found')
              exit(0)

          print('Latest builds:')
          for build in builds[:3]:
              attrs = build['attributes']
              print(f"  Build #{attrs['version']}.{attrs['buildNumber']}")
              print(f"    Status: {attrs['processingState']}")
              print(f"    Uploaded: {attrs['uploadedDate']}")
          SCRIPT

      - name: Clean up
        if: always()
        run: rm -f ~/.appstore/AuthKey_*.p8
