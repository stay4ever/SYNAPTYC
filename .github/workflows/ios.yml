name: iOS Build & Test

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Install dependencies
        run: |
          cd nano-SYNAPSYS
          pod install --repo-update || true

      - name: Build for testing
        run: |
          xcodebuild \
            -project nano-SYNAPSYS/nano-SYNAPSYS.xcodeproj \
            -scheme nano-SYNAPSYS \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath build \
            build-for-testing

      - name: Run unit tests
        run: |
          xcodebuild \
            -project nano-SYNAPSYS/nano-SYNAPSYS.xcodeproj \
            -scheme nano-SYNAPSYS \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath build \
            test \
            -resultBundlePath test-results.xcresult

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xcresult

      - name: Build for release
        run: |
          xcodebuild \
            -project nano-SYNAPSYS/nano-SYNAPSYS.xcodeproj \
            -scheme nano-SYNAPSYS \
            -sdk iphonesimulator \
            -configuration Release \
            -derivedDataPath build \
            build

  lint:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SwiftLint
        run: |
          if ! which swiftlint >/dev/null; then
            brew install swiftlint
          fi
          swiftlint lint nano-SYNAPSYS/ --reporter github-actions-logging || true
