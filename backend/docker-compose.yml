version: "3.8"

services:
  backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}
      - JWT_EXPIRES=30d
      - DB_PATH=/data/nano-synapsys.db
      - BASE_URL=https://www.api.nanosynapsys.com
    volumes:
      - db-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  db-data:
