# SwiftLint configuration for nano-SYNAPSYS

included:
  - nano-SYNAPSYS
  - nano-SYNAPSYSTests

excluded:
  - nano-SYNAPSYS.xcodeproj
  - backend
  - DerivedData
  - Pods
  - .build

# Rules
disabled_rules:
  - trailing_whitespace
  - todo
  - line_length

opt_in_rules:
  - empty_count
  - closure_spacing
  - force_unwrapping
  - implicitly_unwrapped_optional
  - overridden_super_call
  - redundant_nil_coalescing
  - first_where
  - sorted_first_last
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - empty_string
  - last_where
  - modifier_order

# Configuration
identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 60
    error: 80
  excluded:
    - id
    - ok
    - to
    - ws
    - a
    - b
    - i
    - r
    - g

type_name:
  min_length:
    warning: 3
    error: 2
  max_length:
    warning: 50
    error: 60

function_body_length:
  warning: 60
  error: 100

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000
  ignore_comment_only_lines: true

cyclomatic_complexity:
  warning: 15
  error: 25

nesting:
  type_level:
    warning: 3
  function_level:
    warning: 5

force_cast: warning
force_try: warning

reporter: "xcode"
